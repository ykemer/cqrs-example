version: '3.8'

services:
  db-master:
    image: postgres:17.5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespwd
      POSTGRES_DB: cqrs
    ports:
      - "5551:5432"
    volumes:
      - db-master-data:/var/lib/postgresql/data
      - ./docker/master/init-replication.sh:/docker-entrypoint-initdb.d/init-replication.sh:ro
    networks:
      - pgnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12

  db-replica:
    image: postgres:17.5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespwd
      POSTGRES_DB: cqrs
      MASTER_HOST: db-master
      MASTER_PORT: 5432
      REPLICATOR_USER: replicator
      REPLICATOR_PASSWORD: replicatorpwd
    ports:
      - "5552:5432"
    volumes:
      - db-replica-data:/var/lib/postgresql/data
      - ./docker/replica/replica-entrypoint.sh:/replica-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    depends_on:
      db-master:
        condition: service_healthy
    networks:
      - pgnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  db-master-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /Users/conectcell/Desktop/volumes/cqrs/postgres/master/data
  db-replica-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /Users/conectcell/Desktop/volumes/cqrs/postgres/replica/data

networks:
  pgnet:
    driver: bridge
